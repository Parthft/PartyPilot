<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #2b2b40; stroke-width: 2; rx: 10; }
    .agent { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 10; }
    .tool { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 10; }
    .guard { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 10; }
    .title { font-size: 16px; font-weight: bold; fill: #1f2937; }
    .label { font-size: 12px; fill: #374151; }
    .arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="330" y="20" width="240" height="60" class="box" fill="#fff7ed" stroke="#c2410c"/>
  <text x="450" y="45" text-anchor="middle" class="title">User Request</text>
  <text x="450" y="65" text-anchor="middle" class="label">"30th birthday, 20 guests, $500"</text>

  <rect x="330" y="120" width="240" height="70" class="agent"/>
  <text x="450" y="148" text-anchor="middle" class="title">Coordinator Agent</text>
  <text x="450" y="168" text-anchor="middle" class="label">parses, validates, routes, assembles</text>

  <rect x="60" y="260" width="220" height="90" class="agent"/>
  <text x="170" y="288" text-anchor="middle" class="title">Guest List Agent</text>
  <text x="170" y="308" text-anchor="middle" class="label">RSVPs, dietary tags</text>
  <text x="170" y="325" text-anchor="middle" class="label">(only agent holding names)</text>

  <rect x="340" y="260" width="220" height="90" class="agent"/>
  <text x="450" y="288" text-anchor="middle" class="title">Budget Agent</text>
  <text x="450" y="308" text-anchor="middle" class="label">allocates budget across</text>
  <text x="450" y="325" text-anchor="middle" class="label">venue/catering/decor/etc.</text>

  <rect x="620" y="260" width="220" height="90" class="agent"/>
  <text x="730" y="288" text-anchor="middle" class="title">Logistics Agent</text>
  <text x="730" y="308" text-anchor="middle" class="label">venue/caterer search,</text>
  <text x="730" y="325" text-anchor="middle" class="label">timeline builder</text>

  <rect x="620" y="400" width="220" height="70" class="tool"/>
  <text x="730" y="428" text-anchor="middle" class="title">MCP Server</text>
  <text x="730" y="448" text-anchor="middle" class="label">search_venues / search_caterers tools</text>

  <rect x="120" y="500" width="660" height="60" class="guard"/>
  <text x="450" y="525" text-anchor="middle" class="title">Guardrail Layer (safety.py)</text>
  <text x="450" y="545" text-anchor="middle" class="label">input validation · budget sanity checks · PII minimization · prompt-injection filtering</text>

  <path d="M450,80 L450,120" class="arrow"/>
  <path d="M400,190 L200,260" class="arrow"/>
  <path d="M450,190 L450,260" class="arrow"/>
  <path d="M500,190 L700,260" class="arrow"/>
  <path d="M730,350 L730,400" class="arrow"/>
</svg>
